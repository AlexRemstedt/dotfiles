set -a terminal-features "xterm-256color:RGB"
set -g prefix C-s
set -g base-index 1
set -g renumber-windows on
set -g mode-keys vi
set -g status-position top
set -g status-justify absolute-centre
set -g status-style "bg=default"
set -g window-status-current-style "fg=blue bold"
set -g status-right "#(date '+%Y-%m-%d %H:%M %Z')"
set -g status-left "[#S]"
set -g status-left-length 200
set -g mouse on
set escape-time 0

bind r source-file "${XDG_CONFIG_HOME}/tmux/tmux.conf"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r g neww -c "#{pane_current_path}" "lazygit"
bind -r i run-shell "tmux neww tmux-cht.sh"
bind -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"
bind -r D run-shell "tmux neww -c '#{pane_current_path}' 'bash fdtodo'"
bind -r E run-shell "env"
bind -r G run-shell "~/.local/bin/tmux-sessionizer ~/.config/"
bind -r S run-shell "~/.local/bin/tmux-sessionizer ~/.local/bin/"
bind -r Z run-shell "~/.local/bin/tmux-sessionizer ~/.local/share/chezmoi/"
unbind C-[

# ============================================
# PLUGINS (via TPM)
# ============================================

# Install TPM first:
# git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Plugin settings
set -g @resurrect-strategy-vim 'session'
set -g @continuum-restore 'on'

# Initialize TPM (keep at bottom)
run '~/.local/share/tmux/plugins/tpm/tpm'
